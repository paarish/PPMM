*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{background:#030810;font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased}

<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;
const {AreaChart,Area,XAxis,YAxis,Tooltip,CartesianGrid,ResponsiveContainer,ReferenceLine}=Recharts;
const API_KEY="d7fim8pr01qpjqqkv5d0d7fim8pr01qpjqqkv5dg";
const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const DEVICES={

  "iPhone 16":{icon:"📱",width:393, height:852, cols:"repeat(1,1fr)",               radius:50,bezel:10,hfs:"1.05rem"},
  "Mac":      {icon:"💻",width:null,height:null, cols:"repeat(auto-fill,minmax(300px,1fr))",radius:0, bezel:0, hfs:"1.5rem"}
};
const PANEL_IDS=["indices","fx-crypto","bonds-oil","stocks","news"];
const INDICES=[
  {label:"S&P 500",   finnhub:"OANDA:SPX500_USD"},
  {label:"NASDAQ",    finnhub:"OANDA:NAS100_USD"},
  {label:"FTSE 100",  finnhub:"OANDA:UK100_GBP"},
  {label:"DAX",       finnhub:"OANDA:DE30_EUR"},
  {label:"Nikkei 225",finnhub:"OANDA:JP225_USD"},
  {label:"Hang Seng", finnhub:"OANDA:HK33_HKD"},
  {label:"VIX",       finnhub:"^VIX",vix:true}
];
const FX_PAIRS=[
  {label:"GBP/USD",from:"GBP",to:"USD",finnhub:"OANDA:GBP_USD"},
  {label:"EUR/USD",from:"EUR",to:"USD",finnhub:"OANDA:EUR_USD"},
  {label:"USD/JPY",from:"USD",to:"JPY",finnhub:"OANDA:USD_JPY"},
  {label:"EUR/GBP",from:"EUR",to:"GBP",finnhub:"OANDA:EUR_GBP"}
];
const COMMODITIES=[{label:"Brent Crude",symbol:"OANDA:BRENT_USD"},{label:"WTI Crude",symbol:"OANDA:WTICO_USD"}];
const CRYPTO=[{label:"Bitcoin",symbol:"BINANCE:BTCUSDT"}];
const fmt=(n,dec=2)=>{if(n==null||isNaN(n))return"—";return Number(n).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});};
const fmtTime=ts=>new Date(ts*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const fmtAgo=ts=>{const s=Math.floor((Date.now()-ts*1000)/1000);if(s<60)return`${s}s ago`;if(s<3600)return`${Math.floor(s/60)}m ago`;return`${Math.floor(s/3600)}h ago`;};

/* ── Chart Modal ── */
function ChartModal({item,onClose}){
  const [candles,setCandles]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(false);
  const [res,setRes]=useState("15");
  useEffect(()=>{
    if(!item)return;
    setLoading(true);setError(false);setCandles([]);
    (async()=>{
      try{
        const now=Math.floor(Date.now()/1000),from=now-86400,sym=item.finnhub||item.symbol;
        const r=await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${encodeURIComponent(sym)}&resolution=${res}&from=${from}&to=${now}&token=${API_KEY}`);
        const d=await r.json();
        if(d.s==="ok"&&d.t?.length){setCandles(d.t.map((ts,i)=>({time:ts,open:d.o[i],high:d.h[i],low:d.l[i],close:d.c[i]})));}
        else setError(true);
      }catch{setError(true);}
      setLoading(false);
    })();
  },[item,res]);
  if(!item)return null;
  const isUp=candles.length>1&&candles[candles.length-1].close>=candles[0].open;
  const lc=isUp?"#00d084":"#ff4d4d";
  const openP=candles[0]?.open??null,closeP=candles[candles.length-1]?.close??null;
  const highP=candles.length?Math.max(...candles.map(c=>c.high)):null;
  const lowP=candles.length?Math.min(...candles.map(c=>c.low)):null;
  const chgPct=openP&&closeP?((closeP-openP)/openP*100):null;
  const dec=item.label.includes("JPY")?3:(item.label.includes("Bitcoin")||item.label.includes("Nikkei")||item.label.includes("Hang"))?0:2;
  const Tip=({active,payload})=>{
    if(!active||!payload?.length)return null;
    const d=payload[0].payload;
    return(<div style={{background:"#0a1a28",border:"1px solid #1e3a50",borderRadius:6,padding:"7px 11px",fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.67rem"}}>
      <div style={{color:"#5ab0e0",marginBottom:3}}>{fmtTime(d.time)}</div>
      <div style={{color:"#8ba8c4"}}>O {fmt(d.open,dec)}</div>
      <div style={{color:"#8ba8c4"}}>H {fmt(d.high,dec)}</div>
      <div style={{color:"#8ba8c4"}}>L {fmt(d.low,dec)}</div>
      <div style={{color:lc}}>C {fmt(d.close,dec)}</div>
    </div>);
  };
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(3,8,14,0.92)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(8px)",animation:"fadeInBg 0.2s ease"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"linear-gradient(160deg,#0d1f2e,#080f18)",border:"1px solid #1e3a50",borderRadius:12,width:"min(820px,95vw)",maxHeight:"90vh",overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,0.8)",animation:"slideUp 0.22s ease"}}>
        <div style={{padding:"14px 18px 10px",borderBottom:"1px solid #1a2d3e",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.5rem",letterSpacing:"0.12em",color:"#e8eef4"}}>{item.label}</div>
            {closeP!=null&&<div style={{display:"flex",gap:10,alignItems:"baseline",marginTop:3}}>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"1.1rem",color:"#e8eef4"}}>{fmt(closeP,dec)}</span>
              {chgPct!=null&&<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.8rem",color:lc}}>{isUp?"▲":"▼"} {Math.abs(chgPct).toFixed(2)}% today</span>}
            </div>}
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {[["5","5m"],["15","15m"],["30","30m"],["60","1h"]].map(([v,l])=>(
              <button key={v} onClick={()=>setRes(v)} style={{background:res===v?"#0e3a5a":"transparent",border:`1px solid ${res===v?"#1a5a8a":"#1a2d3e"}`,borderRadius:4,color:res===v?"#5ab0e0":"#3a6a8a",padding:"3px 8px",cursor:"pointer",fontSize:"0.64rem",transition:"all 0.15s"}}>{l}</button>
            ))}
            <button onClick={onClose} style={{background:"#0d1e2e",border:"1px solid #1a2d3e",borderRadius:6,color:"#5a8cb0",width:27,height:27,cursor:"pointer",fontSize:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>
        {!loading&&!error&&candles.length>0&&(
          <div style={{display:"flex",background:"#07111a",borderBottom:"1px solid #1a2d3e"}}>
            {[["OPEN",fmt(openP,dec),null],["HIGH",fmt(highP,dec),"#00d084"],["LOW",fmt(lowP,dec),"#ff4d4d"],["CLOSE",fmt(closeP,dec),lc],["BARS",candles.length,null]].map(([l,v,c])=>(
              <div key={l} style={{flex:1,padding:"7px 12px",borderRight:"1px solid #1a2d3e"}}>
                <div style={{fontSize:"0.5rem",color:"#3a6a8a",letterSpacing:"0.1em"}}>{l}</div>
                <div style={{fontSize:"0.78rem",color:c||"#8ba8c4",marginTop:2}}>{v}</div>
              </div>
            ))}
          </div>
        )}
        <div style={{padding:"13px 8px 10px",height:285}}>
          {loading&&<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#3a6a8a",fontSize:"0.73rem",animation:"pulse 1.2s ease infinite"}}>LOADING CANDLES…</div>}
          {!loading&&error&&<div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,color:"#3a6a8a"}}>
            <div style={{fontSize:"1.4rem",opacity:0.4}}>📊</div>
            <div style={{fontSize:"0.7rem",letterSpacing:"0.08em"}}>INTRADAY DATA UNAVAILABLE</div>
            <div style={{fontSize:"0.58rem",color:"#2a4a5a"}}>Symbol may require Finnhub paid tier</div>
          </div>}
          {!loading&&!error&&candles.length>0&&(
            <ResponsiveContainer width="100%" height="100%">
              <AreaChart data={candles} margin={{top:4,right:10,left:2,bottom:0}}>
                <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lc} stopOpacity={0.22}/><stop offset="100%" stopColor={lc} stopOpacity={0}/></linearGradient></defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#0e1d28" vertical={false}/>
                <XAxis dataKey="time" tickFormatter={fmtTime} tick={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,fill:"#3a6a8a"}} axisLine={{stroke:"#1a2d3e"}} tickLine={false} interval="preserveStartEnd"/>
                <YAxis domain={["auto","auto"]} tick={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,fill:"#3a6a8a"}} axisLine={false} tickLine={false} width={68} tickFormatter={v=>fmt(v,dec)}/>
                <Tooltip content={<Tip/>}/>
                {openP&&<ReferenceLine y={openP} stroke="#2a5a8a" strokeDasharray="4 3" strokeWidth={1}/>}
                <Area type="monotone" dataKey="close" stroke={lc} strokeWidth={1.8} fill="url(#cg)" dot={false} activeDot={{r:4,fill:lc,stroke:"#060d13",strokeWidth:2}} animationDuration={500}/>
              </AreaChart>
            </ResponsiveContainer>
          )}
        </div>
        <div style={{padding:"6px 18px",borderTop:"1px solid #0e1d28",fontSize:"0.5rem",color:"#1e3a50",display:"flex",justifyContent:"space-between"}}>
          <span>SOURCE: FINNHUB · LAST 24H</span><span>ESC OR TAP OUTSIDE TO CLOSE</span>
        </div>
      </div>
    </div>
  );
}

/* ── News Panel ── */
function NewsPanel({stockTickers}){
  const [articles,setArticles]=useState([]);
  const [loading,setLoading]=useState(true);
  const [lastFetch,setLastFetch]=useState(null);

  const fetchNews=useCallback(async()=>{
    setLoading(true);
    try{
      const allArticles=[],seen=new Set();
      const from=new Date(Date.now()-7*86400000).toISOString().split("T")[0];
      const to=new Date().toISOString().split("T")[0];
      for(const ticker of stockTickers.slice(0,5)){
        const cleanTag=ticker.replace(".L","").replace("^","");
        try{
          const r=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${encodeURIComponent(ticker)}&from=${from}&to=${to}&token=${API_KEY}`);
          const d=await r.json();
          if(Array.isArray(d))d.slice(0,5).forEach(a=>{if(!seen.has(a.url)&&a.headline&&a.url){seen.add(a.url);allArticles.push({...a,tag:cleanTag});}});
        }catch{}
      }
      for(const cat of ["general","forex","merger"]){
        try{
          const r=await fetch(`https://finnhub.io/api/v1/news?category=${cat}&token=${API_KEY}`);
          const d=await r.json();
          if(Array.isArray(d))d.slice(0,6).forEach(a=>{if(!seen.has(a.url)&&a.headline&&a.url){seen.add(a.url);allArticles.push({...a,tag:cat==="general"?"MARKETS":cat.toUpperCase()});}});
        }catch{}
      }
      allArticles.sort((a,b)=>(b.datetime||0)-(a.datetime||0));
      setArticles(allArticles.slice(0,50));
      setLastFetch(new Date());
    }catch{}
    setLoading(false);
  },[stockTickers]);

  useEffect(()=>{fetchNews();},[fetchNews]);

  const tickerStr=articles.map(a=>`${a.tag?"["+a.tag.toUpperCase()+"] ":""}${a.headline}`).join("   ·   ");
  const tagColor=tag=>{if(!tag)return"#3a6a8a";if(tag==="MARKETS")return"#5ab0e0";if(tag==="FOREX")return"#f0a030";if(tag==="MERGER")return"#a070e0";return"#00d084";};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",minHeight:300}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9,paddingBottom:7,borderBottom:"1px solid #1e2d3d"}}>
        <span>📰</span>
        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"0.9rem",letterSpacing:"0.15em",color:"#8ba8c4"}}>Market News</span>
        <span style={{marginLeft:"auto",fontSize:"0.52rem",color:"#2a5570"}}>{loading?<span style={{animation:"pulse 1s ease infinite",display:"inline-block"}}>FETCHING…</span>:lastFetch?lastFetch.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}</span>
        <button onClick={fetchNews} disabled={loading} style={{background:"transparent",border:"1px solid #1a2d3e",borderRadius:3,color:"#3a6a8a",padding:"2px 5px",cursor:"pointer",fontSize:"0.58rem"}}>↻</button>
      </div>
      {articles.length>0&&(
        <div style={{background:"#07111a",borderRadius:4,padding:"5px 8px",marginBottom:9,border:"1px solid #0e1d28",overflow:"hidden"}}>
          <div className="ticker-wrap">
            <div className="ticker-inner" style={{fontSize:"0.6rem",color:"#5ab0e0",letterSpacing:"0.03em"}}>
              {tickerStr+"   ·   "+tickerStr}
            </div>
          </div>
        </div>
      )}
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
        {loading&&articles.length===0&&<div style={{padding:"18px 0",textAlign:"center",color:"#2a5570",fontSize:"0.7rem",animation:"pulse 1.2s ease infinite"}}>LOADING NEWS…</div>}
        {!loading&&articles.length===0&&<div style={{padding:"18px 0",textAlign:"center",color:"#2a5570",fontSize:"0.7rem"}}>NO ARTICLES FOUND</div>}
        {articles.map((a,i)=>(
          <div key={a.url+i} onClick={()=>window.open(a.url,"_blank")}
            style={{padding:"7px 4px",borderBottom:"1px solid #0a151e",cursor:"pointer",transition:"background 0.1s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(90,176,224,0.04)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}
          >
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
              <span style={{fontSize:"0.5rem",padding:"1px 5px",borderRadius:3,background:`${tagColor(a.tag)}18`,color:tagColor(a.tag),border:`1px solid ${tagColor(a.tag)}40`,letterSpacing:"0.05em",flexShrink:0}}>{(a.tag||"NEWS").toUpperCase()}</span>
              <span style={{fontSize:"0.52rem",color:"#2a5570"}}>{a.source||""}{a.datetime?` · ${fmtAgo(a.datetime)}`:""}</span>
              <span style={{marginLeft:"auto",fontSize:"0.58rem",color:"#2a5a7a",flexShrink:0}}>↗</span>
            </div>
            <div style={{fontSize:"0.72rem",color:"#c8d8e8",lineHeight:1.4}}>{a.headline}</div>
            {a.summary&&<div style={{fontSize:"0.62rem",color:"#4a6a8a",lineHeight:1.35,marginTop:3}}>{a.summary.slice(0,130)}{a.summary.length>130?"…":""}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Common UI ── */
const ChangeChip=({value,pct=false})=>{
  if(value==null||isNaN(value))return <span style={{color:"#334"}}>—</span>;
  const up=value>=0;
  return <span style={{color:up?"#00d084":"#ff4d4d",fontSize:"0.7rem"}}>{up?"▲":"▼"} {Math.abs(value).toFixed(2)}{pct?"%":""}</span>;
};
const PulseIndicator=({active})=>(
  <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:active?"#00d084":"#444",boxShadow:active?"0 0 6px #00d084":"none",marginRight:5,transition:"all 0.3s"}}/>
);
const SectionHeader=({icon,title})=>(
  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9,paddingBottom:6,borderBottom:"1px solid #1e2d3d"}}>
    <span>{icon}</span>
    <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"0.9rem",letterSpacing:"0.15em",color:"#8ba8c4"}}>{title}</span>
  </div>
);
const DataRow=({label,value,change,changePct,unit="",decimals=2,badge,badgeColor,chartItem,onChartClick})=>{
  const [hover,setHover]=useState(false);
  return(
    <div onClick={()=>chartItem&&onChartClick?.(chartItem)} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 5px",borderBottom:"1px solid #0a1318",cursor:chartItem?"pointer":"default",background:hover&&chartItem?"rgba(90,176,224,0.04)":"transparent",borderRadius:3,transition:"background 0.1s",margin:"0 -5px"}}>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        {chartItem&&<span style={{fontSize:"0.56rem",color:hover?"#5ab0e0":"#2a5a7a",transition:"color 0.12s"}}>📈</span>}
        <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.73rem",color:"#8ba8c4"}}>{label}</span>
        {badge&&<span style={{fontSize:"0.5rem",padding:"1px 4px",borderRadius:3,background:badgeColor?`${badgeColor}22`:"#1a2d3e",color:badgeColor||"#5a8cb0",border:badgeColor?`1px solid ${badgeColor}55`:"none",letterSpacing:"0.04em"}}>{badge}</span>}
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:"0.84rem",color:"#e8eef4"}}>{value!=null?`${fmt(value,decimals)}${unit}`:<span style={{color:"#334"}}>—</span>}</div>
        {(change!=null||changePct!=null)&&<div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:1}}>{change!=null&&<ChangeChip value={change}/>}{changePct!=null&&<ChangeChip value={changePct} pct/>}</div>}
      </div>
    </div>
  );
};
const StockManager=({tickers,onAdd,onRemove})=>{
  const [input,setInput]=useState("");
  const submit=()=>{if(input.trim()){onAdd(input.trim());setInput("");}};
  return(
    <div style={{marginTop:9}}>
      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <input value={input} onChange={e=>setInput(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Add ticker e.g. TSLA"
          style={{flex:1,background:"#060e14",border:"1px solid #1e3347",borderRadius:4,padding:"5px 8px",color:"#8ba8c4",fontSize:"0.73rem",outline:"none"}}/>
        <button onClick={submit} style={{background:"#0e3a5a",border:"1px solid #1a5a8a",borderRadius:4,color:"#5ab0e0",padding:"5px 10px",cursor:"pointer",fontSize:"0.7rem"}}>ADD</button>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
        {tickers.map(t=>(
          <div key={t} style={{display:"flex",alignItems:"center",gap:3,background:"#0d2035",border:"1px solid #1a3550",borderRadius:3,padding:"2px 6px"}}>
            <span style={{fontSize:"0.68rem",color:"#8ba8c4"}}>{t}</span>
            <button onClick={()=>onRemove(t)} style={{background:"none",border:"none",color:"#ff4d4d",cursor:"pointer",fontSize:"0.68rem",padding:0,lineHeight:1}}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
};
const DraggableCard=({index,onDragStart,onDragOver,onDrop,isDragOver,isBeingDragged,children})=>(
  <div draggable
    onDragStart={e=>{e.dataTransfer.effectAllowed="move";onDragStart(index);}}
    onDragOver={e=>{e.preventDefault();onDragOver(index);}}
    onDrop={e=>{e.preventDefault();onDrop(index);}}
    onDragEnd={()=>onDrop(index)}
    style={{background:isDragOver?"linear-gradient(145deg,#112840,#0d2030)":"linear-gradient(145deg,#0d1b26,#0a1520)",border:isDragOver?"1.5px dashed #5ab0e0":"1px solid #1a2d3e",borderRadius:8,padding:"12px 13px",boxShadow:isDragOver?"0 0 18px rgba(90,176,224,0.15)":"0 4px 18px rgba(0,0,0,0.4)",opacity:isBeingDragged?0.4:1,cursor:"grab",transition:"all 0.12s",position:"relative",userSelect:"none"}}
  >
    <div style={{position:"absolute",top:8,right:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px",opacity:0.17,pointerEvents:"none"}}>
      {[0,1,2,3,4,5].map(i=><div key={i} style={{width:3,height:3,borderRadius:"50%",background:"#5ab0e0"}}/>)}
    </div>
    {children}
  </div>
);
const DeviceFrame=({device,children})=>{
  const d=DEVICES[device];
  if(!d.width)return <div style={{flex:1,overflow:"auto",display:"flex",flexDirection:"column"}}>{children}</div>;
  return(
    <div style={{display:"flex",justifyContent:"center",alignItems:"flex-start",padding:"18px 0 32px",background:"#030810",flex:1,overflow:"auto"}}>
      <div style={{width:d.width+d.bezel*2,background:device==="iPhone 16"?"#1a1a1e":"#1c2028",borderRadius:d.radius+d.bezel,padding:d.bezel,boxShadow:"0 28px 70px rgba(0,0,0,0.85),0 0 0 1px rgba(255,255,255,0.06)",position:"relative"}}>
        {device==="iPhone 16"&&<div style={{position:"absolute",top:d.bezel+9,left:"50%",transform:"translateX(-50%)",width:116,height:32,background:"#000",borderRadius:18,zIndex:10}}/>}
        {device==="iPad Air"&&<div style={{position:"absolute",top:"50%",left:d.bezel/2,transform:"translateY(-50%)",width:5,height:5,background:"#222",borderRadius:"50%",border:"1px solid #333"}}/>}
        <div style={{width:d.width,height:d.height,borderRadius:d.radius-3,overflow:"hidden",background:"#060d13",position:"relative"}}>{children}</div>
        {device==="iPhone 16"&&<div style={{height:4,width:90,background:"#333",borderRadius:2,margin:"7px auto 0"}}/>}
      </div>
    </div>
  );
};

/* ── Main App ── */
function App(){
  const [refreshMin,setRefreshMin]=useState(()=>LS.get("ppmm_refresh",5));
  const [device,setDevice]=useState(()=>LS.get("ppmm_device","iPad Air"));
  const [panelOrder,setPanelOrder]=useState(()=>{
    const saved=LS.get("ppmm_panels",PANEL_IDS);
    const missing=PANEL_IDS.filter(id=>!saved.includes(id));
    return [...saved,...missing];
  });
  const [stockTickers,setStockTickers]=useState(()=>LS.get("ppmm_tickers",["AAPL","BARC.L"]));
  const [lastUpdated,setLastUpdated]=useState(null);
  const [refreshing,setRefreshing]=useState(false);
  const [countdown,setCountdown]=useState(0);
  const [savedFlash,setSavedFlash]=useState(false);
  const [chartItem,setChartItem]=useState(null);
  const [dragFrom,setDragFrom]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [indices,setIndices]=useState({});
  const [fx,setFx]=useState({});
  const [commodities,setCommodities]=useState({});
  const [crypto,setCrypto]=useState({});
  const [bonds,setBonds]=useState({});
  const [stocks,setStocks]=useState({});
  const timerRef=useRef(null),countdownRef=useRef(null);
  const curDevice=DEVICES[device];

  useEffect(()=>{LS.set("ppmm_panels",panelOrder);},[panelOrder]);
  useEffect(()=>{LS.set("ppmm_tickers",stockTickers);},[stockTickers]);
  useEffect(()=>{LS.set("ppmm_refresh",refreshMin);},[refreshMin]);
  useEffect(()=>{LS.set("ppmm_device",device);},[device]);

  const fetchQuote=async sym=>{try{const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${API_KEY}`);const d=await r.json();if(d.c&&d.c>0)return{price:d.c,change:d.d,changePct:d.dp};}catch{}return null;};
  const fetchFx=async(from,to)=>{try{const r=await fetch(`https://finnhub.io/api/v1/forex/rates?base=${from}&token=${API_KEY}`);const d=await r.json();if(d.quote?.[to])return{price:d.quote[to]};}catch{}return null;};
  const fetchBonds=async()=>{
    const res={};
    for(const s of [{label:"US 2Y",id:"DGS2"},{label:"US 10Y",id:"DGS10"}]){try{const r=await fetch(`https://fred.stlouisfed.org/graph/fredgraph.csv?id=${s.id}`);const txt=await r.text();const lines=txt.trim().split("\n").filter(l=>!l.startsWith("DATE"));for(let i=lines.length-1;i>=0;i--){const[,v]=lines[i].split(",");if(v&&v!=="."&&!isNaN(+v)){res[s.label]={price:+v};break;}}}catch{}}
    for(const s of [{label:"UK 2Y",sym:"GBGB2YD.B"},{label:"UK 10Y",sym:"GBGB10YD.B"}]){try{const r=await fetch(`https://stooq.com/q/d/l/?s=${s.sym}&i=d`);const txt=await r.text();const lines=txt.trim().split("\n").filter(l=>!l.startsWith("Date"));if(lines.length){const last=lines[lines.length-1].split(",");if(last[4]&&!isNaN(+last[4]))res[s.label]={price:+last[4]};}}catch{}}
    return res;
  };

  const fetchAll=useCallback(async()=>{
    setRefreshing(true);
    const idxR={};for(const i of INDICES){const q=await fetchQuote(i.finnhub);if(q)idxR[i.label]=q;}setIndices(idxR);
    const fxR={};for(const p of FX_PAIRS){const q=await fetchFx(p.from,p.to);if(q)fxR[p.label]=q;}setFx(fxR);
    const comR={};for(const c of COMMODITIES){const q=await fetchQuote(c.symbol);if(q)comR[c.label]=q;}setCommodities(comR);
    const crR={};for(const c of CRYPTO){const q=await fetchQuote(c.symbol);if(q)crR[c.label]=q;}setCrypto(crR);
    setBonds(await fetchBonds());
    const stkR={};for(const t of stockTickers){const q=await fetchQuote(t);if(q)stkR[t]=q;}setStocks(stkR);
    setLastUpdated(new Date());setRefreshing(false);setCountdown(refreshMin*60);
  },[stockTickers,refreshMin]);

  useEffect(()=>{fetchAll();},[]);
  useEffect(()=>{if(timerRef.current)clearInterval(timerRef.current);timerRef.current=setInterval(fetchAll,refreshMin*60*1000);setCountdown(refreshMin*60);return()=>clearInterval(timerRef.current);},[refreshMin,fetchAll]);
  useEffect(()=>{if(countdownRef.current)clearInterval(countdownRef.current);countdownRef.current=setInterval(()=>setCountdown(c=>Math.max(0,c-1)),1000);return()=>clearInterval(countdownRef.current);},[lastUpdated]);
  useEffect(()=>{const h=e=>{if(e.key==="Escape")setChartItem(null);};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  const fmtCd=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const flash=()=>{setSavedFlash(true);setTimeout(()=>setSavedFlash(false),1400);};
  const addTicker=t=>{if(!stockTickers.includes(t)){setStockTickers(p=>[...p,t]);flash();}};
  const removeTicker=t=>setStockTickers(p=>p.filter(x=>x!==t));
  const handleDragStart=i=>setDragFrom(i);
  const handleDragOver=i=>{if(i!==dragFrom)setDragOver(i);};
  const handleDrop=i=>{if(dragFrom!==null&&dragFrom!==i){const next=[...panelOrder];const[m]=next.splice(dragFrom,1);next.splice(i,0,m);setPanelOrder(next);flash();}setDragFrom(null);setDragOver(null);};
  const openChart=item=>setChartItem(item);
  const hint=<div style={{fontSize:"0.52rem",color:"#2a5570",marginBottom:6,letterSpacing:"0.06em"}}>TAP ROW TO CHART</div>;

  const panelContent={
    indices:(
      <><SectionHeader icon="🌍" title="Global Equity Indices"/>{hint}
        {INDICES.map(i=>{const vv=i.vix?indices[i.label]?.price:null;const vl=vv==null?null:vv<15?{label:"LOW FEAR",color:"#00d084"}:vv<25?{label:"MODERATE",color:"#f0a030"}:vv<35?{label:"HIGH FEAR",color:"#ff7040"}:{label:"EXTREME",color:"#ff4d4d"};return <DataRow key={i.label} label={i.label} value={indices[i.label]?.price} change={i.vix?null:indices[i.label]?.change} changePct={i.vix?null:indices[i.label]?.changePct} decimals={i.label.includes("Nikkei")||i.label.includes("Hang")?0:2} badge={vl?.label} badgeColor={vl?.color} chartItem={{label:i.label,finnhub:i.finnhub}} onChartClick={openChart}/>;})}</>
    ),
    "fx-crypto":(
      <><SectionHeader icon="💱" title="FX Rates"/>{hint}
        {FX_PAIRS.map(p=><DataRow key={p.label} label={p.label} value={fx[p.label]?.price} decimals={p.label.includes("JPY")?3:5} chartItem={{label:p.label,finnhub:p.finnhub}} onChartClick={openChart}/>)}
        <div style={{marginTop:11}}><SectionHeader icon="₿" title="Cryptocurrency"/>
          {CRYPTO.map(c=><DataRow key={c.label} label={c.label} value={crypto[c.label]?.price} change={crypto[c.label]?.change} changePct={crypto[c.label]?.changePct} decimals={0} unit=" USD" chartItem={{label:c.label,finnhub:c.symbol}} onChartClick={openChart}/>)}</div></>
    ),
    "bonds-oil":(
      <><SectionHeader icon="🏛️" title="Government Bond Yields"/>
        {["US 2Y","US 10Y"].map(l=><DataRow key={l} label={l} value={bonds[l]?.price} unit="%" badge="FRED" decimals={2}/>)}
        {["UK 2Y","UK 10Y"].map(l=><DataRow key={l} label={l} value={bonds[l]?.price} unit="%" badge="STOOQ" decimals={2}/>)}
        <div style={{marginTop:11}}><SectionHeader icon="🛢️" title="Crude Oil"/>{hint}
          {COMMODITIES.map(c=><DataRow key={c.label} label={c.label} value={commodities[c.label]?.price} change={commodities[c.label]?.change} changePct={commodities[c.label]?.changePct} unit=" USD" decimals={2} chartItem={{label:c.label,finnhub:c.symbol}} onChartClick={openChart}/>)}</div></>
    ),
    stocks:(
      <><SectionHeader icon="📈" title="Stocks"/>{hint}
        {stockTickers.map(t=><DataRow key={t} label={t} value={stocks[t]?.price} change={stocks[t]?.change} changePct={stocks[t]?.changePct} decimals={2} chartItem={{label:t,finnhub:t}} onChartClick={openChart}/>)}
        <StockManager tickers={stockTickers} onAdd={addTicker} onRemove={removeTicker}/></>
    ),
    news:<NewsPanel stockTickers={stockTickers}/>,
  };

  const Dashboard=()=>(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#060d13",color:"#e8eef4",overflow:"hidden"}}>
      <div style={{background:"linear-gradient(90deg,#060d13 0%,#0a1a28 50%,#060d13 100%)",borderBottom:"1px solid #1a2d3e",padding:device==="iPhone 16"?"8px 11px":"10px 15px",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:curDevice.hfs,letterSpacing:"0.18em",color:"#5ab0e0",lineHeight:1}}>PPMM</div>
            <div style={{fontSize:"0.48rem",color:"#3a6a8a",letterSpacing:"0.1em",marginTop:1}}>PRIVATE MARKETS MONITOR</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:device==="iPhone 16"?6:12}}>
            {device!=="iPhone 16"&&<div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:"0.52rem",color:"#3a6a8a"}}>REFRESH</span><input type="range" min={1} max={30} value={refreshMin} onChange={e=>setRefreshMin(+e.target.value)} style={{width:52,cursor:"pointer"}}/><span style={{fontSize:"0.63rem",color:"#5ab0e0",minWidth:24}}>{refreshMin}m</span></div>}
            <div style={{textAlign:"right"}}>
              <div style={{display:"flex",alignItems:"center",gap:3}}><PulseIndicator active={!refreshing}/><span style={{fontSize:"0.56rem",color:refreshing?"#f0a030":"#00d084",letterSpacing:"0.08em"}}>{refreshing?"…":"LIVE"}</span></div>
              {lastUpdated&&<div style={{fontSize:"0.48rem",color:"#3a6a8a"}}>{lastUpdated.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})} · {fmtCd(countdown)}</div>}
            </div>
            <button onClick={fetchAll} disabled={refreshing} style={{background:refreshing?"#0a1e2e":"#0e3a5a",border:"1px solid #1a5a8a",borderRadius:4,color:refreshing?"#2a5a7a":"#5ab0e0",padding:"4px 8px",cursor:refreshing?"default":"pointer",fontSize:"0.6rem"}}>↻</button>
          </div>
        </div>
        {device==="iPhone 16"&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:5}}><span style={{fontSize:"0.5rem",color:"#3a6a8a"}}>REFRESH</span><input type="range" min={1} max={30} value={refreshMin} onChange={e=>setRefreshMin(+e.target.value)} style={{flex:1,cursor:"pointer"}}/><span style={{fontSize:"0.62rem",color:"#5ab0e0",minWidth:24}}>{refreshMin}m</span></div>}
      </div>
      <div style={{background:"#07111a",borderBottom:"1px solid #0d1c28",padding:"3px 14px",fontSize:"0.5rem",color:"#2a5a74",letterSpacing:"0.07em",display:"flex",gap:8,flexShrink:0,alignItems:"center"}}>
        <span>⠿ DRAG</span><span>·</span><span>📈 CHART</span><span>·</span><span>📰 NEWS</span>
        {savedFlash&&<span style={{color:"#00d084",marginLeft:"auto",animation:"fadeInBg 0.2s ease"}}>✓ SAVED</span>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 11px 20px"}}>
        <div style={{display:"grid",gridTemplateColumns:curDevice.cols,gap:10}}>
          {panelOrder.map((id,index)=>(
            <DraggableCard key={id} index={index} onDragStart={handleDragStart} onDragOver={handleDragOver} onDrop={handleDrop} isDragOver={dragOver===index&&dragFrom!==index} isBeingDragged={dragFrom===index}>
              {panelContent[id]}
            </DraggableCard>
          ))}
        </div>
      </div>
      <div style={{textAlign:"center",padding:"5px",fontSize:"0.46rem",color:"#1e3a50",letterSpacing:"0.08em",borderTop:"1px solid #0e1d28",flexShrink:0}}>
        FINNHUB · FRED · STOOQ · INFORMATIONAL USE ONLY
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#030810",display:"flex",flexDirection:"column",fontFamily:"'IBM Plex Mono',monospace"}}>
      {chartItem&&<ChartModal item={chartItem} onClose={()=>setChartItem(null)}/>}
      <div style={{background:"#060d13",borderBottom:"1px solid #1a2d3e",padding:"4px 12px",display:"flex",alignItems:"center",justifyContent:"center",gap:4,flexShrink:0}}>
        <span style={{fontSize:"0.48rem",color:"#2a5570",letterSpacing:"0.1em",marginRight:3}}>VIEW</span>
        {Object.keys(DEVICES).map(d=>(
          <button key={d} onClick={()=>setDevice(d)} style={{background:device===d?"#0e3a5a":"transparent",border:`1px solid ${device===d?"#1a5a8a":"#131f2b"}`,borderRadius:3,color:device===d?"#5ab0e0":"#2a5570",padding:"2px 7px",cursor:"pointer",fontSize:"0.54rem",letterSpacing:"0.04em",transition:"all 0.15s",display:"flex",alignItems:"center",gap:3}}>
            <span style={{fontSize:"0.6rem"}}>{DEVICES[d].icon}</span>
            <span>{d}</span>
            {device===d&&<span style={{fontSize:"0.38rem",color:"#00d084"}}>●</span>}
          </button>
        ))}
        <span style={{marginLeft:"auto",fontSize:"0.45rem",color:"#1a3050",letterSpacing:"0.06em"}}>AUTO-SAVED</span>
      </div>
      <DeviceFrame device={device}><Dashboard/></DeviceFrame>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
